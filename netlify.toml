[build]
  functions = "functions"  # Pasta das funções serverless
  publish = "."           # Pasta dos arquivos estáticos

[dev]
  framework = "#static"    # Tipo de projeto
  targetPort = 8888       # Porta local
  autoLaunch = false       # Não abrir navegador automaticamente
  command = "npm run dev"  # Comando para iniciar

[context.production]
  environment = { GROQ_API_KEY = "@groq_api_key" } # Variável de produção
  functions = "functions"
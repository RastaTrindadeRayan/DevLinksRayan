<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RASTRINDADs - Chat IA</title>
  <style>
    body { font-family: Arial; background: #fdf6e3; padding: 20px; }
    #chat { max-width: 600px; margin: auto; border: 1px solid #ccc; padding: 10px; background: #fff; }
    .msg { margin: 10px 0; }
    .user { color: green; }
    .bot { color: navy; }
  </style>
</head>
<body>
  <h2>RASTRINDADs 🌿✨</h2>
  <div id="chat"></div>
  <input type="text" id="input" placeholder="Escreva sua pergunta..." style="width: 80%;" />
  <button onclick="send()">Enviar</button>

  <script>
    async function send() {
      const input = document.getElementById("input");
      const chat = document.getElementById("chat");
      const message = input.value;
      if (!message) return;
      chat.innerHTML += `<div class='msg user'><b>Você:</b> ${message}</div>`;
      input.value = "";

      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
      });
      const data = await res.json();
      chat.innerHTML += `<div class='msg bot'><b>RASTRINDADs:</b> ${data.reply}</div>`;
    }
  </script>
</body>
</html>
